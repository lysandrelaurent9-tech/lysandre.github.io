/* ===== French detail page typography/layout refinement ===== */
body.lang-fr .detail-page{
    grid-template-columns: 30% 38% 32%;
    gap: 24px;
}

body.lang-fr .detail-left,
body.lang-fr .detail-right{
    padding: 34px 32px;
}

body.lang-fr .detail-title{
    font-size: clamp(1.85rem, 3.05vw, 3.45rem);
    letter-spacing: .045em;
    line-height: 1.12;
    word-break: normal;
    hyphens: auto;
}

body.lang-fr .detail-pinyin{
    letter-spacing: .20em;
    font-size: .72rem;
    margin-bottom: 22px;
}

body.lang-fr .detail-quote{
    font-size: .95rem;
    line-height: 1.9;
    margin: 22px 0 24px;
}

body.lang-fr .detail-tags{
    gap: 8px;
    margin-bottom: 26px;
}

body.lang-fr .detail-tag{
    font-size: .76rem;
    letter-spacing: .025em;
    padding: 8px 12px;
    line-height: 1.35;
}

body.lang-fr .detail-timeline{
    font-size: .84rem;
    line-height: 2.35;
}

body.lang-fr .detail-heading{
    font-size: 1.42rem;
    letter-spacing: .045em;
    margin-bottom: 18px;
}

body.lang-fr .detail-kicker{
    font-size: .72rem;
    letter-spacing: .12em;
}

body.lang-fr .detail-desc{
    font-size: .92rem;
    line-height: 2.05;
    letter-spacing: .01em;
    text-align: left;
}

body.lang-fr .detail-value-grid{
    gap: 12px;
    margin-top: 22px;
}

body.lang-fr .detail-value{
    padding: 15px 16px;
    border-radius: 20px;
}

body.lang-fr .detail-value h3{
    font-size: .94rem;
    letter-spacing: .035em;
}

body.lang-fr .detail-value p{
    font-size: .82rem;
    line-height: 1.75;
}

body.lang-fr .detail-showcase{
    width: min(88%, 500px);
    border-width: 12px;

body.lang-fr .detail-caption{
    font-size: .86rem;

    body.lang-fr .detail-showcase{

/* ===== Opening word-cloud fly-in animation ===== */
/* 首次打开网页、以及切换语言时，中央水印与四周词云从不同方向柔和飞入；入场完成后恢复原有漂浮呼吸 */
.hero.wordcloud-animate .hero-watermark{
    animation:heroWatermarkEnter 2.8s cubic-bezier(.16,1,.3,1) .08s both,
              watermarkBreath 8s ease-in-out 2.95s infinite !important;
    will-change:transform,opacity,filter;
}

.watermark-cloud .wm{
    opacity:0;
    filter:blur(10px);
    will-change:transform,opacity,filter;
    backface-visibility:hidden;
    transform-origin:center;
}

.hero.wordcloud-animate .wm1{--fly-x:-36vw;--fly-y:-24vh;--fly-r:-8deg;animation:wmFlyIn 2.55s cubic-bezier(.16,1,.3,1) .18s both,drift1 11s ease-in-out 2.86s infinite !important}
.hero.wordcloud-animate .wm2{--fly-x:34vw;--fly-y:-28vh;--fly-r:7deg;animation:wmFlyIn 2.70s cubic-bezier(.16,1,.3,1) .28s both,drift2 14s ease-in-out 3.05s infinite !important}
.hero.wordcloud-animate .wm3{--fly-x:-42vw;--fly-y:-6vh;--fly-r:-12deg;animation:wmFlyIn 2.62s cubic-bezier(.16,1,.3,1) .40s both,drift3 12s ease-in-out 3.12s infinite !important}
.hero.wordcloud-animate .wm4{--fly-x:38vw;--fly-y:-4vh;--fly-r:10deg;animation:wmFlyIn 2.78s cubic-bezier(.16,1,.3,1) .34s both,drift1 15s ease-in-out 3.18s infinite !important}
.hero.wordcloud-animate .wm5{--fly-x:40vw;--fly-y:26vh;--fly-r:9deg;animation:wmFlyIn 2.58s cubic-bezier(.16,1,.3,1) .48s both,drift2 13s ease-in-out 3.12s infinite !important}
.hero.wordcloud-animate .wm6{--fly-x:-36vw;--fly-y:28vh;--fly-r:-9deg;animation:wmFlyIn 2.86s cubic-bezier(.16,1,.3,1) .54s both,drift3 10s ease-in-out 3.35s infinite !important}
.hero.wordcloud-animate .wm7{--fly-x:-16vw;--fly-y:38vh;--fly-r:-6deg;animation:wmFlyIn 2.72s cubic-bezier(.16,1,.3,1) .66s both,drift1 16s ease-in-out 3.45s infinite !important}
.hero.wordcloud-animate .wm8{--fly-x:18vw;--fly-y:40vh;--fly-r:8deg;animation:wmFlyIn 2.82s cubic-bezier(.16,1,.3,1) .60s both,drift2 12s ease-in-out 3.40s infinite !important}
.hero.wordcloud-animate .wm9{--fly-x:0vw;--fly-y:42vh;--fly-r:5deg;animation:wmFlyIn 2.64s cubic-bezier(.16,1,.3,1) .78s both,drift3 14s ease-in-out 3.55s infinite !important}
.hero.wordcloud-animate .wm10{--fly-x:0vw;--fly-y:-40vh;--fly-r:-5deg;animation:wmFlyIn 2.92s cubic-bezier(.16,1,.3,1) .44s both,drift1 18s ease-in-out 3.45s infinite !important}

@keyframes wmFlyIn{
    0%{opacity:0;filter:blur(12px);transform:translate3d(var(--fly-x),var(--fly-y),0) scale(.72) rotate(var(--fly-r))}
    58%{opacity:.72;filter:blur(2px);transform:translate3d(calc(var(--fly-x) * -.025),calc(var(--fly-y) * -.025),0) scale(1.035) rotate(0deg)}
    100%{opacity:1;filter:blur(0);transform:translate3d(0,0,0) scale(1) rotate(0deg)}
}

@keyframes heroWatermarkEnter{
    0%{opacity:0;filter:blur(18px);transform:scale(1.18) translate3d(0,10px,0)}
    65%{opacity:.82;filter:blur(3px);transform:scale(.985) translate3d(0,0,0)}
    100%{opacity:.55;filter:blur(0);transform:scale(1) translate3d(0,0,0)}
}

@media (prefers-reduced-motion:reduce){
    .hero-watermark,
    .watermark-cloud .wm{
        animation:none !important;
        opacity:1;
        filter:none;
        transform:none;
    }
}


/* ===== Logo click entrance + hover interaction ===== */
.hero-logo{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:999px;
    padding:10px;
    transition:transform .45s cubic-bezier(.16,1,.3,1), filter .45s ease;
    z-index:6;
}
.hero-logo::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:radial-gradient(circle,rgba(46,139,135,.18),rgba(255,255,255,.05) 58%,transparent 72%);
    opacity:0;
    transform:scale(.72);
    transition:opacity .45s ease,transform .45s cubic-bezier(.16,1,.3,1);
    pointer-events:none;
}
.hero-logo::after{
    content:"进入专题";
    position:absolute;
    left:50%;
    bottom:-28px;
    transform:translateX(-50%) translateY(8px);
    padding:6px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.48);
    border:1px solid rgba(255,255,255,.56);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    color:#6f8f87;
    font-size:.68rem;
    letter-spacing:.18em;
    white-space:nowrap;
    opacity:0;
    transition:opacity .35s ease,transform .35s cubic-bezier(.16,1,.3,1);
    pointer-events:none;
    box-shadow:0 10px 24px rgba(60,45,30,.06);
}
body.lang-en .hero-logo::after{content:"Explore";letter-spacing:.12em}
body.lang-ja .hero-logo::after{content:"展示へ";letter-spacing:.12em}
body.lang-fr .hero-logo::after{content:"Explorer";letter-spacing:.08em}
.hero-logo:hover,
.hero-logo:focus-visible{
    transform:translateY(-6px) scale(1.045);
    filter:drop-shadow(0 18px 28px rgba(46,139,135,.16));
}
.hero-logo:hover::before,
.hero-logo:focus-visible::before{
    opacity:1;
    transform:scale(1.12);
}
.hero-logo:hover::after,
.hero-logo:focus-visible::after{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}
.hero-logo:hover img,
.hero-logo:focus-visible img{
    animation:logoHoverPulse 1.2s ease-in-out infinite alternate !important;
}
.hero-logo.logo-clicked{
    animation:logoClickPop .62s cubic-bezier(.16,1,.3,1);
}
@keyframes logoHoverPulse{
    from{transform:scale(1);filter:drop-shadow(0 8px 18px rgba(0,0,0,.08))}
    to{transform:scale(1.055);filter:drop-shadow(0 18px 34px rgba(46,139,135,.22))}
}
@keyframes logoClickPop{
    0%{transform:translateY(-6px) scale(1.04)}
    45%{transform:translateY(-2px) scale(.96)}
    100%{transform:translateY(-6px) scale(1.04)}
}
@media(max-width:768px){
    .hero-logo::after{bottom:-22px;font-size:.62rem}
}

const detailThemes = {
  yudiao: { theme: "#4D8F73", light: "rgba(77,143,115,.15)" },
  manao: { theme: "#B8894F", light: "rgba(184,137,79,.16)" },
  cixiu: { theme: "#A35252", light: "rgba(163,82,82,.15)" },
  muou: { theme: "#7A5A3A", light: "rgba(122,90,58,.15)" }
};

let currentLang = "zh";
let currentDetailType = null;

function replayWordCloudIntro() {
  const hero = document.querySelector(".hero");
  if (!hero) return;
  hero.classList.remove("wordcloud-animate");
  void hero.offsetWidth;
  hero.classList.add("wordcloud-animate");
}

function updateLanguage(lang) {
  const dict = translations[lang] || translations.zh;
  currentLang = lang;
  localStorage.setItem("zjfy_lang", lang);

  document.documentElement.lang = lang === "ja" ? "ja" : lang === "fr" ? "fr" : lang === "en" ? "en" : "zh-CN";
  document.body.classList.toggle("lang-ja", lang === "ja");
  document.body.classList.toggle("lang-en", lang === "en");
  document.body.classList.toggle("lang-fr", lang === "fr");

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) {
      el.textContent = dict[key];
      el.classList.remove("text-fade");
      void el.offsetWidth;
      el.classList.add("text-fade");
    }
  });

  document.querySelectorAll(".lang-bar button").forEach(btn => {
    const call = btn.getAttribute("onclick") || "";
    btn.classList.toggle("active", call.includes("'" + lang + "'"));
  });

  replayWordCloudIntro();

  if (currentDetailType) renderDetail(currentDetailType);
}

function renderDetail(type) {
  const dict = translations[currentLang] || translations.zh;
  const data = dict.detail[type];
  const theme = detailThemes[type];
  if (!data || !theme) return;

  currentDetailType = type;
  const page = document.getElementById("detailPage");
  page.style.setProperty("--theme", theme.theme);
  page.style.setProperty("--light", theme.light);
  page.setAttribute("data-watermark", data.name);

  document.getElementById("detailIndex").textContent = data.index;
  document.getElementById("detailTitle").textContent = data.name;
  document.getElementById("detailPinyin").textContent = data.pinyin;
  document.getElementById("detailQuote").textContent = data.quote;
  document.getElementById("detailHeading").textContent = data.heading;
  document.getElementById("detailDesc").textContent = data.desc;
  const detailImg = document.getElementById("detailImg");
  const detailModel = document.getElementById("detailModel");
  const detailShowcase = document.getElementById("detailShowcase");
  if (type === "yudiao") {
    detailImg.removeAttribute("src");
    detailImg.alt = data.name;
    detailModel.src = "jade.glb";
    detailModel.alt = data.name + " 3D 模型";
    detailShowcase.classList.add("model-active");
  } else {
    detailImg.src = detailImages[type];
    detailImg.alt = data.name;
    detailShowcase.classList.remove("model-active");
  }
  document.getElementById("detailCaptionTitle").textContent = data.name;
  document.getElementById("detailCaptionMeta").textContent = data.area + data.captionSuffix;

  document.getElementById("detailTags").innerHTML =
    data.tags.map(t => `<span class="detail-tag">${t}</span>`).join("");

  document.getElementById("detailTimeline").innerHTML =
    data.timeline.map(t => `<div>${t}</div>`).join("");

  document.getElementById("detailValues").innerHTML =
    data.values.map(v => `<div class="detail-value"><h3>${v[0]}</h3><p>${v[1]}</p></div>`).join("");

  page.classList.add("active");
  document.body.classList.add("detail-open");
}

function closeDetail() {
  document.getElementById("detailPage").classList.remove("active");
  document.body.classList.remove("detail-open");
  currentDetailType = null;
}

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => renderDetail(card.getAttribute("data-type")));
});


function scrollToExhibition() {
  const target = document.getElementById("exhibition");
  const logo = document.querySelector(".hero-logo");
  if (!target) return;
  if (logo) {
    logo.classList.remove("logo-clicked");
    void logo.offsetWidth;
    logo.classList.add("logo-clicked");
  }
  target.scrollIntoView({ behavior: "smooth", block: "start" });
}

const heroLogo = document.querySelector(".hero-logo");
if (heroLogo) {
  heroLogo.addEventListener("click", scrollToExhibition);
  heroLogo.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      scrollToExhibition();
    }
  });
}

document.getElementById("detailClose").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDetail();
});

const showcase = document.getElementById("detailShowcase");
showcase.addEventListener("mousemove", e => {
  const r = showcase.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top) / r.height - 0.5;
  showcase.style.transform = `perspective(900px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg) translateY(-4px)`;
});
showcase.addEventListener("mouseleave", () => {
  showcase.style.transform = "perspective(900px) rotateY(0deg) rotateX(0deg)";
});

document.addEventListener("DOMContentLoaded", () => {
  updateLanguage("zh");
});
</script>
